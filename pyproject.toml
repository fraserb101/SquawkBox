[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["alembic/versions", "alembic/env.py"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long
    "B008",  # FastAPI Depends/Header pattern in defaults
    "B904",  # raise X from err — stylistic, don't want to rewrite every except
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811", "F841"]
