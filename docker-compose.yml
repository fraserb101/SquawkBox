# LOCAL DEVELOPMENT ONLY — not used in production.
#
# For production deployment, SquawkBox runs on Railway.app.
# See SETUP.md for the Railway deployment guide.
#
# This file is only useful if you have a laptop with Docker Desktop
# and want to run the stack locally. Usage:
#
#   cp .env.example .env && fill in values
#   docker compose up --build
#
# You'll also need ngrok to expose port 8000 to Twilio for local testing.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A celery_worker worker --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A celery_worker beat --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
